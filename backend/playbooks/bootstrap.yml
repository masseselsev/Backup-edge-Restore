---
- name: Bootstrap Edge Node
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Ensure python3 and aptitude are installed
      raw: apt-get update && apt-get install -y python3 python3-pip
      changed_when: false

    - name: Install dependencies
      apt:
        name:
          - borgbackup
          - parted
          - udev
          - dosfstools
          - e2fsprogs
          - util-linux
        state: present
        update_cache: yes

    - name: Create borg system user
      user:
        name: borg
        shell: /bin/bash
        create_home: yes
        system: yes

    - name: Generate SSH key for borg user
      user:
        name: borg
        generate_ssh_key: yes
        ssh_key_type: ed25519
        ssh_key_file: .ssh/id_ed25519

    - name: Read generated public key
      slurp:
        src: /home/borg/.ssh/id_ed25519.pub
      register: pubkey

    - name: Return public key to orchestrator
      debug:
        msg: "SSH_KEY: {{ pubkey['content'] | b64decode | trim }}"

    - name: Ensure .ssh directory exists for root
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'
      when: orchestrator_ssh_pub_key is defined and orchestrator_ssh_pub_key | length > 0

    - name: Authorize orchestrator SSH public key on edge node
      lineinfile:
        path: /root/.ssh/authorized_keys
        line: "{{ orchestrator_ssh_pub_key }}"
        create: yes
        mode: '0600'
      when: orchestrator_ssh_pub_key is defined and orchestrator_ssh_pub_key | length > 0

    - name: Configure SSH to allow root login with keys
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin prohibit-password'
        state: present
      register: ssh_config_updated

    - name: Restart SSH service to apply configuration
      service:
        name: ssh
        state: restarted
      when: ssh_config_updated.changed
